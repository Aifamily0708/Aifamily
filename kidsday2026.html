        ];

        let activeTab = 'south';

        // Helper functions 針對顏色、樣式的設定
        function getTypeStyles(type) {
            switch (type) {
                case 'free': return 'bg-rose-500 text-white shadow-sm';
                case 'discount': return 'bg-amber-500 text-white shadow-sm';
                case 'market': return 'bg-emerald-500 text-white shadow-sm';
                case 'art': return 'bg-violet-500 text-white shadow-sm';
                default: return 'bg-sky-500 text-white shadow-sm';
            }
        }

        function getTypeColor(type) {
            switch (type) {
                case 'free': return 'text-rose-500';
                case 'discount': return 'text-amber-500';
                case 'market': return 'text-emerald-500';
                case 'art': return 'text-violet-500';
                default: return 'text-sky-500';
            }
        }

        function getTypeBg(type) {
            switch (type) {
                case 'free': return 'bg-rose-50 border-rose-100';
                case 'discount': return 'bg-amber-50 border-amber-100';
                case 'market': return 'bg-emerald-50 border-emerald-100';
                case 'art': return 'bg-violet-50 border-violet-100';
                default: return 'bg-sky-50 border-sky-100';
            }
        }

        function getTypeIconName(type) {
            switch (type) {
                case 'free': return 'gift';
                case 'discount': return 'ticket';
                case 'market': return 'tent';
                case 'art': return 'baby';
                default: return 'party-popper';
            }
        }

        function getTypeText(type) {
            switch (type) {
                case 'free': return '超省錢';
                case 'discount': return '好康優惠';
                default: return '玩翻天';
            }
        }

        // 渲染上方地區按鈕
        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = regions.map(region => {
                const isActive = activeTab === region.id;
                const activeClass = isActive 
                    ? `bg-gradient-to-r ${region.color} text-white border-transparent shadow-lg transform scale-105 -translate-y-1`
                    : 'bg-white text-slate-500 border-slate-100 hover:bg-slate-50 hover:border-slate-200 hover:-translate-y-0.5';

                return `
                <button onclick="changeTab('${region.id}')" class="flex-1 min-w-[110px] flex flex-col items-center justify-center py-3 px-4 rounded-2xl transition-all duration-300 ease-in-out border-2 ${activeClass}">
                    <span class="text-2xl mb-1">${region.icon}</span>
                    <span class="font-bold text-sm whitespace-nowrap">${region.name}</span>
                </button>
                `;
            }).join('');
        }

        // 渲染下方活動卡片
        function renderCards() {
            const filteredActivities = activities.filter(a => a.region === activeTab);
            document.getElementById('activity-count').innerText = `共 ${filteredActivities.length} 項活動`;

            const container = document.getElementById('cards-container');
            container.innerHTML = filteredActivities.map(item => {
                const regionColor = regions.find(r => r.id === item.region).color;
                
                const tagsHtml = item.tags.map(tag => `
                    <span class="inline-flex items-center text-xs font-bold px-2.5 py-1 rounded-md bg-slate-100 text-slate-500">
                        <i data-lucide="tag" class="w-3 h-3 mr-1"></i>
                        ${tag}
                    </span>
                `).join('');

                return `
                <div class="bg-white rounded-3xl p-6 shadow-sm hover:shadow-xl transition-all duration-300 border border-slate-100 hover:border-purple-200 flex flex-col h-full relative overflow-hidden group">
                    <!-- Colorful Top Accent -->
                    <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r ${regionColor}"></div>

                    <!-- Type Badge top right -->
                    <div class="absolute top-4 right-0 px-3 py-1.5 rounded-l-full text-xs font-bold flex items-center shadow-sm ${getTypeStyles(item.type)}">
                        <i data-lucide="${getTypeIconName(item.type)}" class="w-4 h-4 mr-1"></i>
                        ${getTypeText(item.type)}
                    </div>

                    <!-- City Tag -->
                    <div class="mb-3 mt-1">
                        <span class="inline-block bg-slate-100 text-slate-600 text-xs font-bold px-3 py-1.5 rounded-lg tracking-wider">
                            ${item.city}
                        </span>
                    </div>

                    <h3 class="text-xl font-bold text-slate-800 mb-3 leading-tight group-hover:text-purple-600 transition-colors">
                        ${item.title}
                    </h3>

                    <div class="space-y-2 mb-4 mt-auto">
                        <div class="flex items-start">
                            <i data-lucide="map-pin" class="w-4 h-4 mr-2 mt-0.5 flex-shrink-0 ${getTypeColor(item.type)}"></i>
                            <span class="text-sm font-medium text-slate-600">${item.location}</span>
                        </div>
                        <div class="flex items-start">
                            <i data-lucide="calendar" class="w-4 h-4 mr-2 mt-0.5 flex-shrink-0 ${getTypeColor(item.type)}"></i>
                            <span class="text-sm font-medium text-slate-600">${item.date}</span>
                        </div>
                    </div>

                    <p class="text-slate-700 text-sm leading-relaxed mb-5 p-3.5 rounded-2xl border ${getTypeBg(item.type)}">
                        ${item.desc}
                    </p>

                    <div class="flex flex-wrap gap-2 mt-auto pt-3 border-t border-slate-100">
                        ${tagsHtml}
                    </div>
                </div>
                `;
            }).join('');

            // 初始化與重新渲染 Lucide 圖示
            lucide.createIcons();
        }

        // 切換區域的分頁處理
        window.changeTab = function(regionId) {
            activeTab = regionId;
            renderTabs();
            renderCards();
        }

        // 頁面載入初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderTabs();
            renderCards();
            lucide.createIcons();
        });
    </script>
